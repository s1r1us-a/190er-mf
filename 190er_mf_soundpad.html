  // ─── GLEICHE CONFIG WIE IN index.html EINTRAGEN ───
  const firebaseConfig = {

    projectId:         "er-mf-39e54",

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>190er MF – Soundpad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d060;
  --gold-dim: #6b5220;
  --black: #040404;
  --glow-cyan: #00f5ff;
  --glow-purple: #9b30ff;
  --text: #e8dcc8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--black);color:var(--text);font-family:Rajdhani,sans-serif;overflow-x:hidden;min-height:100vh}

/* ─── CONCERT BG ─── */
.stage{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--black)}
.beam{position:absolute;top:-40px;width:3px;height:130vh;transform-origin:top center;opacity:0;animation:beamSweep var(--dur) ease-in-out infinite}
.b1{left:6%;--dur:6s;background:linear-gradient(180deg,rgba(201,168,76,1) 0%,rgba(201,168,76,0) 75%);transform:rotate(-14deg);animation-delay:0s}
.b2{left:22%;--dur:9s;background:linear-gradient(180deg,rgba(0,245,255,.95) 0%,rgba(0,245,255,0) 70%);transform:rotate(-4deg);animation-delay:-2s}
.b3{left:40%;--dur:7s;background:linear-gradient(180deg,rgba(155,48,255,1) 0%,rgba(155,48,255,0) 65%);transform:rotate(5deg);animation-delay:-4.5s}
.b4{left:60%;--dur:10s;background:linear-gradient(180deg,rgba(201,168,76,.8) 0%,rgba(201,168,76,0) 75%);transform:rotate(-9deg);animation-delay:-1s}
.b5{left:78%;--dur:8s;background:linear-gradient(180deg,rgba(0,245,255,.85) 0%,rgba(0,245,255,0) 68%);transform:rotate(7deg);animation-delay:-6s}
@keyframes beamSweep{0%{opacity:0;filter:blur(3px)}15%{opacity:1;filter:blur(.5px)}40%{opacity:.5;filter:blur(1px)}65%{opacity:1;filter:blur(.5px)}85%{opacity:.25}100%{opacity:0;filter:blur(3px)}}
.haze{position:absolute;border-radius:50%;filter:blur(80px);animation:hazePulse var(--hp) ease-in-out infinite alternate}
.h1{width:500px;height:250px;bottom:-80px;left:-100px;background:radial-gradient(ellipse,rgba(201,168,76,.2) 0%,transparent 70%);--hp:8s}
.h2{width:450px;height:220px;bottom:-60px;right:-80px;background:radial-gradient(ellipse,rgba(0,245,255,.15) 0%,transparent 70%);--hp:10s;animation-delay:-3s}
.h3{width:350px;height:180px;bottom:20px;left:35%;background:radial-gradient(ellipse,rgba(155,48,255,.12) 0%,transparent 70%);--hp:7s;animation-delay:-5s}
@keyframes hazePulse{0%{transform:scale(1) translateY(0);opacity:.8}100%{transform:scale(1.15) translateY(-20px);opacity:1}}
.floor-spot{position:absolute;bottom:0;border-radius:50%;filter:blur(40px);animation:spotPulse var(--sp) ease-in-out infinite alternate}
.fs1{width:180px;height:55px;left:6%;background:radial-gradient(ellipse,rgba(201,168,76,.3) 0%,transparent 70%);--sp:6s}
.fs2{width:160px;height:48px;left:22%;background:radial-gradient(ellipse,rgba(0,245,255,.28) 0%,transparent 70%);--sp:9s;animation-delay:-2s}
.fs3{width:170px;height:50px;left:40%;background:radial-gradient(ellipse,rgba(155,48,255,.28) 0%,transparent 70%);--sp:7s;animation-delay:-4.5s}
.fs4{width:160px;height:48px;left:60%;background:radial-gradient(ellipse,rgba(201,168,76,.25) 0%,transparent 70%);--sp:10s;animation-delay:-1s}
.fs5{width:155px;height:46px;left:78%;background:radial-gradient(ellipse,rgba(0,245,255,.25) 0%,transparent 70%);--sp:8s;animation-delay:-6s}
@keyframes spotPulse{0%{opacity:.4;transform:scaleX(1)}100%{opacity:1;transform:scaleX(1.2)}}
.rising-fog{position:fixed;bottom:0;left:0;right:0;z-index:1;pointer-events:none;height:50vh;background:linear-gradient(180deg,transparent 0%,rgba(201,168,76,.015) 40%,rgba(201,168,76,.04) 70%,rgba(0,0,0,.15) 100%);animation:fogRise 12s ease-in-out infinite alternate}
@keyframes fogRise{0%{transform:translateY(8%);opacity:.7}100%{transform:translateY(0);opacity:1}}
.strobe{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;animation:stb 13s linear infinite}
@keyframes stb{0%,88%,90%,92%,100%{opacity:0}89%,91%{opacity:.018}}
.bg-grid{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(201,168,76,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.022) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(4,4,4,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(201,168,76,.15)}
.nav-back{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-family:"Share Tech Mono",monospace;font-size:11px;letter-spacing:.25em;-webkit-tap-highlight-color:transparent;transition:color .2s}
.nav-back:active{color:var(--gold)}
.nav-back-arrow{width:28px;height:28px;border:1px solid rgba(201,168,76,.25);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold)}
.nav-logo{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:4px;color:var(--text)}
.nav-logo em{color:var(--gold);font-style:normal;text-shadow:0 0 20px rgba(201,168,76,.8)}

/* ─── PAGE HEADER ─── */
.page-header{position:relative;z-index:10;padding:90px 20px 32px;text-align:center}
.page-header-logo{width:clamp(64px,18vw,90px);height:clamp(64px,18vw,90px);border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.4);box-shadow:0 0 24px rgba(201,168,76,.4);margin:0 auto 16px;display:block}
.page-header-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(42px,12vw,72px);letter-spacing:.08em;line-height:.9;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(201,168,76,.6));margin-bottom:8px}
.page-header-sub{font-family:"Share Tech Mono",monospace;font-size:9px;color:rgba(201,168,76,.45);letter-spacing:.4em;text-transform:uppercase}

/* ─── PAD WRAPPER ─── */
.pad-page-wrap{position:relative;z-index:10;padding:0 16px max(48px,env(safe-area-inset-bottom,0px) + 32px)}

/* ─── SOUNDPAD ─── */
.pad-intro{font-family:"Share Tech Mono",monospace;font-size:11px;color:rgba(232,220,200,.35);letter-spacing:.3em;text-transform:uppercase;margin-bottom:28px}

.bpm-bar{display:flex;align-items:center;gap:12px;background:linear-gradient(160deg,rgba(30,24,12,.9),rgba(10,10,10,.95));border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px 18px;margin-bottom:20px;box-shadow:0 2px 0 rgba(201,168,76,.08) inset,0 -2px 0 rgba(0,0,0,.6) inset,0 12px 40px rgba(0,0,0,.7);flex-wrap:wrap;gap:12px}
.bpm-display{display:flex;flex-direction:column;align-items:center;min-width:52px}
.bpm-label{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(201,168,76,.4);letter-spacing:.3em}
.bpm-value{font-family:"Bebas Neue",sans-serif;font-size:36px;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(201,168,76,.6)}
.bpm-controls{display:flex;align-items:center;gap:8px;flex:1}
.bpm-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(201,168,76,.25);background:rgba(201,168,76,.08);color:var(--gold);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .1s}
.bpm-btn:active{background:rgba(201,168,76,.25)}
.bpm-slider{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(201,168,76,.2);border-radius:2px;outline:none;cursor:pointer}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.7);cursor:pointer}
.seq-toggle{display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.08);color:var(--gold);font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:.25em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,box-shadow .15s;white-space:nowrap}
.seq-toggle.playing{background:rgba(201,168,76,.2);border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.4)}
.seq-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:.5;transition:opacity .15s,box-shadow .15s}
.seq-toggle.playing .seq-dot{opacity:1;box-shadow:0 0 8px var(--gold);animation:livePulse 0.5s ease-in-out infinite}

/* Sequencer */
.seq-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.seq-row{display:flex;align-items:center;gap:6px}
.seq-row-label{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(232,220,200,.35);letter-spacing:.15em;width:36px;flex-shrink:0;text-align:right}
.seq-steps{display:flex;gap:4px;flex:1}
.seq-step{flex:1;height:32px;border-radius:5px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s,border-color .1s,box-shadow .1s;position:relative}
.seq-step.active{background:var(--step-color,rgba(201,168,76,.35));border-color:var(--step-border,rgba(201,168,76,.6));box-shadow:0 0 8px var(--step-glow,rgba(201,168,76,.4))}
.seq-step.playing{box-shadow:0 0 14px var(--step-glow,rgba(201,168,76,.8)),0 0 28px var(--step-glow,rgba(201,168,76,.4)) !important;transform:scaleY(1.08)}
.seq-divider{width:1px;background:rgba(201,168,76,.15);flex-shrink:0;margin:0 2px}

/* Live Pads */
.pads-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.pads-label span:first-child{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--glow-cyan);letter-spacing:.3em;text-shadow:0 0 8px var(--glow-cyan)}
.pads-hint{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(232,220,200,.25);letter-spacing:.15em}
.pad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.pad{border-radius:12px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:linear-gradient(160deg,rgba(28,22,10,.88),rgba(8,8,16,.95));box-shadow:0 2px 0 rgba(255,255,255,.04) inset,0 -2px 0 rgba(0,0,0,.6) inset,0 8px 24px rgba(0,0,0,.6);transition:transform .08s,box-shadow .08s;user-select:none}
.pad::before{content:"";position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);border-radius:12px 12px 0 0;pointer-events:none}
.pad-name{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;color:rgba(232,220,200,.85);text-transform:uppercase;pointer-events:none;line-height:1}
.pad-key{font-family:"Share Tech Mono",monospace;font-size:9px;line-height:1;pointer-events:none;opacity:.35;align-self:flex-end}
.pad.hit{transform:scale(.94);box-shadow:0 0 0 rgba(0,0,0,0) inset,0 2px 8px rgba(0,0,0,.4)}
.pad[data-color="gold"]{border-color:rgba(201,168,76,.3)}
.pad[data-color="gold"] .pad-key{color:var(--gold);text-shadow:0 0 12px rgba(201,168,76,.8)}
.pad[data-color="gold"].hit{background:linear-gradient(160deg,rgba(80,60,10,.7),rgba(40,30,5,.9));box-shadow:0 0 20px rgba(201,168,76,.5),inset 0 0 20px rgba(201,168,76,.1)}
.pad[data-color="cyan"]{border-color:rgba(0,245,255,.25)}
.pad[data-color="cyan"] .pad-key{color:var(--glow-cyan);text-shadow:0 0 12px rgba(0,245,255,.8)}
.pad[data-color="cyan"].hit{background:linear-gradient(160deg,rgba(0,60,65,.7),rgba(0,20,25,.9));box-shadow:0 0 20px rgba(0,245,255,.4),inset 0 0 20px rgba(0,245,255,.08)}
.pad[data-color="purple"]{border-color:rgba(155,48,255,.25)}
.pad[data-color="purple"] .pad-key{color:#bf7fff;text-shadow:0 0 12px rgba(155,48,255,.8)}
.pad[data-color="purple"].hit{background:linear-gradient(160deg,rgba(40,10,70,.7),rgba(15,5,25,.9));box-shadow:0 0 20px rgba(155,48,255,.4),inset 0 0 20px rgba(155,48,255,.08)}
.pad[data-color="red"]{border-color:rgba(255,32,112,.25)}
.pad[data-color="red"] .pad-key{color:#ff7aaa;text-shadow:0 0 12px rgba(255,32,112,.8)}
.pad[data-color="red"].hit{background:linear-gradient(160deg,rgba(70,5,30,.7),rgba(25,2,12,.9));box-shadow:0 0 20px rgba(255,32,112,.4),inset 0 0 20px rgba(255,32,112,.08)}

/* Visualizer */
.viz-canvas{width:100%;height:90px;border-radius:10px;background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.1);display:block}



/* ─── BEAT COUNTER ─── */
.beat-counter{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.beat-dot{width:18px;height:18px;border-radius:50%;border:1px solid rgba(201,168,76,.2);background:rgba(255,255,255,.03);transition:background .08s,box-shadow .08s}
.beat-dot.active{background:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.9),0 0 28px rgba(201,168,76,.4)}
.beat-dot.sub{width:10px;height:10px;border-color:rgba(201,168,76,.12)}
.beat-dot.sub.active{background:rgba(201,168,76,.5);box-shadow:0 0 8px rgba(201,168,76,.5)}

/* ─── VU METERS ─── */
.seq-vu{width:6px;flex-shrink:0;height:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;padding:2px 0}
.seq-vu-bar{width:100%;border-radius:1px;background:var(--vu-c,var(--gold));opacity:.15;height:3px;transition:opacity .08s}
.seq-vu-bar.lit{opacity:1;box-shadow:0 0 4px var(--vu-c,var(--gold))}

/* ─── SEQUENCER CONTROLS ROW ─── */
.seq-controls{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.seq-ctrl-btn{padding:7px 12px;border-radius:8px;border:1px solid rgba(201,168,76,.2);background:rgba(201,168,76,.06);color:rgba(232,220,200,.6);font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.2em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s,color .15s;white-space:nowrap}
.seq-ctrl-btn:active,.seq-ctrl-btn.on{background:rgba(201,168,76,.18);color:var(--gold);border-color:rgba(201,168,76,.4)}
.seq-ctrl-spacer{flex:1}
.zoom-label{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(232,220,200,.3);letter-spacing:.2em}

/* ─── MASTER VOLUME ─── */
.master-vol{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 16px;background:rgba(10,10,10,.6);border:1px solid rgba(201,168,76,.12);border-radius:10px}
.vol-label{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(201,168,76,.4);letter-spacing:.3em;flex-shrink:0}
.vol-slider{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(201,168,76,.2);border-radius:2px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.7);cursor:pointer}
.vol-val{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold);width:34px;text-align:right;line-height:1}

/* ─── KEYBOARD HINT ─── */
.kb-hint{font-family:"Share Tech Mono",monospace;font-size:8px;color:rgba(232,220,200,.2);letter-spacing:.2em;text-align:center;margin-top:12px;padding-bottom:8px}
.kb-hint em{color:rgba(201,168,76,.4);font-style:normal}

/* ─── REVERB TOGGLE ON BPM BAR ─── */
.fx-btn{padding:8px 12px;border-radius:8px;border:1px solid rgba(155,48,255,.25);background:rgba(155,48,255,.06);color:rgba(191,127,255,.6);font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:.2em;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.fx-btn.on{background:rgba(155,48,255,.2);color:#bf7fff;border-color:rgba(155,48,255,.5);box-shadow:0 0 12px rgba(155,48,255,.3)}

/* ─── EXTRA OVERRIDES FOR STANDALONE PAGE ─── */
.bpm-bar{margin-bottom:16px}
.viz-canvas{margin-top:4px}

/* ─── LOGOUT BUTTON ─── */
.logout-btn{display:flex;align-items:center;gap:7px;padding:6px 12px;background:rgba(255,60,60,.07);border:1px solid rgba(255,60,60,.2);border-radius:99px;font-family:"Share Tech Mono",monospace;font-size:9px;color:rgba(255,120,120,.7);letter-spacing:.2em;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s}
.logout-btn:active{background:rgba(255,60,60,.18);border-color:rgba(255,60,60,.4);color:#ff8888}
.logout-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,100,100,.6);flex-shrink:0}

</style>
</head>
<body>

<div class="stage">
  <div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div>
  <div class="beam b4"></div><div class="beam b5"></div>
  <div class="haze h1"></div><div class="haze h2"></div><div class="haze h3"></div>
  <div class="floor-spot fs1"></div><div class="floor-spot fs2"></div><div class="floor-spot fs3"></div>
  <div class="floor-spot fs4"></div><div class="floor-spot fs5"></div>
  <div class="rising-fog"></div>
  <div class="strobe"></div>
</div>
<div class="bg-grid"></div>

<nav>
  <a href="190er_mf_final.html" class="nav-back">
    <div class="nav-back-arrow">←</div>
    BACK
  </a>
  <div class="nav-logo">190<em>er</em> MF</div>
  <button class="logout-btn" id="logoutBtn"><div class="logout-dot"></div>Logout</button>

<script>
// ═══════════════════════════════
// SOUNDPAD ENGINE v2
// ═══════════════════════════════
(function(){
  let ctx = null;
  let masterGain, analyser, vizBuf, reverbNode, dryGain, wetGain;
  let bpm = 190;
  let isPlaying = false;
  let seqInterval = null;
  let currentStep = 0;
  let reverbOn = false;
  let zoomStart = 0; // 0 or 8
  let zoomedMode = false;
  const STEPS = 16;

  const tracks = [
    { name:'KICK',    key:'K', color:'gold',   pattern: new Array(STEPS).fill(false), c2:'rgba(201,168,76', glow:'rgba(201,168,76,.4)' },
    { name:'SNARE',   key:'S', color:'cyan',   pattern: new Array(STEPS).fill(false), c2:'rgba(0,245,255',  glow:'rgba(0,245,255,.4)' },
    { name:'HI-HAT',  key:'H', color:'purple', pattern: new Array(STEPS).fill(false), c2:'rgba(155,48,255', glow:'rgba(155,48,255,.4)' },
    { name:'ACID',    key:'A', color:'red',    pattern: new Array(STEPS).fill(false), c2:'rgba(255,32,112', glow:'rgba(255,32,112,.4)' },
  ];
  tracks[0].pattern[0]=tracks[0].pattern[4]=tracks[0].pattern[8]=tracks[0].pattern[12]=true;
  tracks[1].pattern[4]=tracks[1].pattern[12]=true;
  tracks[2].pattern[2]=tracks[2].pattern[6]=tracks[2].pattern[10]=tracks[2].pattern[14]=true;
  tracks[3].pattern[3]=tracks[3].pattern[7]=tracks[3].pattern[11]=true;

  // VU levels per track
  const vuLevels = [0,0,0,0];

  function initAudio() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.85;
    analyser = ctx.createAnalyser();
    analyser.fftSize = 512;
    vizBuf = new Uint8Array(analyser.frequencyBinCount);

    // Reverb chain: dry/wet
    dryGain = ctx.createGain(); dryGain.gain.value = 1;
    wetGain = ctx.createGain(); wetGain.gain.value = 0;
    buildReverb().then(rev => {
      reverbNode = rev;
      masterGain.connect(dryGain);
      masterGain.connect(reverbNode);
      reverbNode.connect(wetGain);
      dryGain.connect(analyser);
      wetGain.connect(analyser);
      analyser.connect(ctx.destination);
    });
    startViz();
  }

  async function buildReverb() {
    const len = ctx.sampleRate * 2.2;
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.5);
      }
    }
    const conv = ctx.createConvolver();
    conv.buffer = buf;
    return conv;
  }

  // ── SOUNDS ──
  function dest() { return masterGain; }

  function playKick(t) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(dest());
    o.frequency.setValueAtTime(160,t);
    o.frequency.exponentialRampToValueAtTime(28,t+0.25);
    g.gain.setValueAtTime(1.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.start(t); o.stop(t+0.36);
    vuLevels[0]=1;
  }
  function playSnare(t) {
    const len=ctx.sampleRate*0.18, buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1200;
    const g=ctx.createGain();
    src.connect(f); f.connect(g); g.connect(dest());
    g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    src.start(t); src.stop(t+0.19);
    const o=ctx.createOscillator(),g2=ctx.createGain();
    o.connect(g2); g2.connect(dest()); o.frequency.value=200;
    g2.gain.setValueAtTime(0.4,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t); o.stop(t+0.11);
    vuLevels[1]=1;
  }
  function playHat(t, open) {
    const dur=open?0.28:0.06, len=Math.floor(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=9000; f.Q.value=0.8;
    const g=ctx.createGain();
    src.connect(f); f.connect(g); g.connect(dest());
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.start(t); src.stop(t+dur+0.01);
    vuLevels[2]=1;
  }
  function playAcid(t, note, resonance) {
    const freqs=[55,65.4,73.4,87.3,110,130.8];
    const freq=freqs[note||0];
    const res=resonance||12;
    const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;
    const filt=ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=280; filt.Q.value=res;
    const g=ctx.createGain();
    o.connect(filt); filt.connect(g); g.connect(dest());
    filt.frequency.setValueAtTime(280,t);
    filt.frequency.exponentialRampToValueAtTime(3500,t+0.07);
    filt.frequency.exponentialRampToValueAtTime(280,t+0.32);
    g.gain.setValueAtTime(0.75,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.34);
    o.start(t); o.stop(t+0.35);
    vuLevels[3]=1;
  }
  function playSynth(t) {
    const o=ctx.createOscillator(); o.type='square'; o.frequency.value=220;
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800; f.Q.value=4;
    const g=ctx.createGain();
    o.connect(f); f.connect(g); g.connect(dest());
    f.frequency.exponentialRampToValueAtTime(2400,t+0.05);
    f.frequency.exponentialRampToValueAtTime(800,t+0.2);
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.start(t); o.stop(t+0.23);
  }
  function playClap(t) {
    for(let i=0;i<3;i++){
      const delay=i*0.012, len=Math.floor(ctx.sampleRate*0.05);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<len;j++) d[j]=Math.random()*2-1;
      const src=ctx.createBufferSource(); src.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=1.2;
      const g=ctx.createGain();
      src.connect(f); f.connect(g); g.connect(dest());
      g.gain.setValueAtTime(0.6,t+delay); g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.08);
      src.start(t+delay); src.stop(t+delay+0.09);
    }
  }
  function playRiser(t) {
    const o=ctx.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.4);
    const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2000; f.Q.value=6;
    const g=ctx.createGain();
    o.connect(f); f.connect(g); g.connect(dest());
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.42);
    o.start(t); o.stop(t+0.43);
  }
  function playBass(t) {
    const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=55;
    const o2=ctx.createOscillator(); o2.type='square'; o2.frequency.value=55;
    const g=ctx.createGain(), g2=ctx.createGain();
    o.connect(g); g.connect(dest()); o2.connect(g2); g2.connect(dest());
    g.gain.setValueAtTime(0.8,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    g2.gain.setValueAtTime(0.3,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t); o.stop(t+0.51); o2.start(t); o2.stop(t+0.31);
  }

  const pads = [
    { name:'KICK',    key:'A', color:'gold',   fn:()=>playKick(ctx.currentTime) },
    { name:'SNARE',   key:'S', color:'cyan',   fn:()=>playSnare(ctx.currentTime) },
    { name:'HI-HAT',  key:'D', color:'purple', fn:()=>playHat(ctx.currentTime,false) },
    { name:'OPEN HH', key:'F', color:'purple', fn:()=>playHat(ctx.currentTime,true) },
    { name:'ACID A',  key:'G', color:'red',    fn:()=>playAcid(ctx.currentTime,0,12) },
    { name:'ACID B',  key:'H', color:'red',    fn:()=>playAcid(ctx.currentTime,2,18) },
    { name:'ACID C',  key:'J', color:'red',    fn:()=>playAcid(ctx.currentTime,3,8) },
    { name:'ACID D',  key:'K', color:'red',    fn:()=>playAcid(ctx.currentTime,5,22) },
    { name:'SYNTH',   key:'Z', color:'gold',   fn:()=>playSynth(ctx.currentTime) },
    { name:'CLAP',    key:'X', color:'cyan',   fn:()=>playClap(ctx.currentTime) },
    { name:'RISER',   key:'C', color:'purple', fn:()=>playRiser(ctx.currentTime) },
    { name:'BASS',    key:'V', color:'gold',   fn:()=>playBass(ctx.currentTime) },
  ];

  // keyboard map
  const keyMap = {};
  pads.forEach((p,i) => { keyMap[p.key.toLowerCase()] = i; });

  // Build sequencer
  function buildSeq() {
    const grid = document.getElementById('seqGrid');
    grid.innerHTML = '';
    const start = zoomedMode ? zoomStart : 0;
    const end   = zoomedMode ? zoomStart + 8 : 16;
    tracks.forEach((tr, ti) => {
      const row = document.createElement('div');
      row.className = 'seq-row';
      // VU
      const vu = document.createElement('div');
      vu.className = 'seq-vu';
      vu.style.setProperty('--vu-c', tr.c2+',1)');
      for(let b=0;b<5;b++){
        const bar=document.createElement('div');
        bar.className='seq-vu-bar';
        bar.dataset.track=ti; bar.dataset.bar=b;
        vu.appendChild(bar);
      }
      row.appendChild(vu);
      // Label
      const label = document.createElement('div');
      label.className = 'seq-row-label'; label.textContent = tr.name;
      row.appendChild(label);
      // Steps
      const steps = document.createElement('div');
      steps.className = 'seq-steps';
      for (let i = start; i < end; i++) {
        if (!zoomedMode && (i===4||i===8||i===12)) {
          const div=document.createElement('div'); div.className='seq-divider'; steps.appendChild(div);
        }
        const btn = document.createElement('button');
        btn.className = 'seq-step' + (tr.pattern[i]?' active':'');
        btn.style.setProperty('--step-color', tr.c2+',.3)');
        btn.style.setProperty('--step-border', tr.c2+',.55)');
        btn.style.setProperty('--step-glow', tr.glow);
        btn.dataset.track=ti; btn.dataset.step=i;
        btn.addEventListener('click',()=>{
          initAudio();
          tr.pattern[i]=!tr.pattern[i];
          btn.classList.toggle('active',tr.pattern[i]);
        });
        steps.appendChild(btn);
      }
      row.appendChild(steps);
      grid.appendChild(row);
    });
  }

  // Build pads
  function buildPads() {
    const grid = document.getElementById('padGrid');
    grid.innerHTML = '';
    pads.forEach((p,i) => {
      const btn = document.createElement('button');
      btn.className = 'pad'; btn.dataset.color = p.color; btn.dataset.idx = i;
      btn.innerHTML = '<span class="pad-name">'+p.name+'</span><span class="pad-key">'+p.key+'</span>';
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        initAudio();
        if(ctx.state==='suspended') ctx.resume();
        p.fn();
        btn.classList.add('hit');
        setTimeout(()=>btn.classList.remove('hit'),120);
      });
      grid.appendChild(btn);
    });
  }

  // Sequencer step trigger
  function triggerStep(step) {
    if(!ctx) return;
    const t=ctx.currentTime;
    tracks.forEach((tr,ti)=>{
      if(tr.pattern[step]){
        if(ti===0) playKick(t);
        else if(ti===1) playSnare(t);
        else if(ti===2) playHat(t,false);
        else if(ti===3) playAcid(t,step%4,10+(step%3)*5);
      }
    });
    // Beat dots
    document.querySelectorAll('.beat-dot').forEach((d,i)=>{
      d.classList.toggle('active', i===step);
    });
    // Seq step highlight
    document.querySelectorAll('.seq-step').forEach(btn=>{
      btn.classList.remove('playing');
      if(parseInt(btn.dataset.step)===step) btn.classList.add('playing');
    });
    // VU decay
    vuLevels.forEach((v,i)=>{ if(v>0) vuLevels[i]=Math.max(0,v-0.25); });
    setTimeout(()=>{
      tracks.forEach((tr,ti)=>{
        const bars=document.querySelectorAll('.seq-vu-bar[data-track="'+ti+'"]');
        const level = tr.pattern[step]?5:0;
        bars.forEach((b,bi)=> b.classList.toggle('lit', bi < level));
      });
      setTimeout(()=>{
        document.querySelectorAll('.seq-vu-bar').forEach(b=>b.classList.remove('lit'));
      }, 80);
    }, 10);
  }

  function startSeq() {
    if(seqInterval) return;
    initAudio();
    if(ctx.state==='suspended') ctx.resume();
    currentStep=0;
    const ms=(60/bpm/4)*1000;
    triggerStep(currentStep);
    seqInterval=setInterval(()=>{ currentStep=(currentStep+1)%STEPS; triggerStep(currentStep); }, ms);
  }
  function stopSeq() {
    clearInterval(seqInterval); seqInterval=null; currentStep=0;
    document.querySelectorAll('.seq-step').forEach(b=>b.classList.remove('playing'));
    document.querySelectorAll('.beat-dot').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.seq-vu-bar').forEach(b=>b.classList.remove('lit'));
  }
  function restartSeq() { if(!isPlaying) return; stopSeq(); startSeq(); }

  // Controls
  document.getElementById('seqToggle').addEventListener('click',()=>{
    initAudio();
    isPlaying=!isPlaying;
    const btn=document.getElementById('seqToggle');
    const lbl=document.getElementById('seqLabel');
    if(isPlaying){ startSeq(); btn.classList.add('playing'); lbl.textContent='STOP'; }
    else{ stopSeq(); btn.classList.remove('playing'); lbl.textContent='START'; }
  });

  // BPM
  const slider=document.getElementById('bpmSlider');
  const bpmDisplay=document.getElementById('bpmVal');
  function updateBpm(v){ bpm=Math.max(100,Math.min(220,v)); bpmDisplay.textContent=bpm; slider.value=bpm; restartSeq(); }
  slider.addEventListener('input',()=>updateBpm(parseInt(slider.value)));
  document.getElementById('bpmDown').addEventListener('click',()=>updateBpm(bpm-5));
  document.getElementById('bpmUp').addEventListener('click',()=>updateBpm(bpm+5));

  // Reverb
  document.getElementById('reverbBtn').addEventListener('click',()=>{
    initAudio();
    reverbOn=!reverbOn;
    document.getElementById('reverbBtn').classList.toggle('on',reverbOn);
    if(dryGain && wetGain){
      dryGain.gain.setTargetAtTime(reverbOn?0.6:1, ctx.currentTime, 0.05);
      wetGain.gain.setTargetAtTime(reverbOn?0.45:0, ctx.currentTime, 0.05);
    }
  });

  // Clear all
  document.getElementById('clearBtn').addEventListener('click',()=>{
    tracks.forEach(tr=>tr.pattern.fill(false));
    document.querySelectorAll('.seq-step').forEach(b=>b.classList.remove('active'));
  });

  // Zoom
  document.getElementById('zoomBtn').addEventListener('click',()=>{
    zoomedMode=!zoomedMode;
    const btn=document.getElementById('zoomBtn');
    const lbl=document.getElementById('zoomRange');
    if(zoomedMode){
      btn.textContent='FULL VIEW'; btn.classList.add('on');
      lbl.textContent='STEPS '+(zoomStart+1)+'–'+(zoomStart+8);
    } else {
      btn.textContent='8-STEP ZOOM'; btn.classList.remove('on');
      lbl.textContent='STEPS 1–16';
    }
    buildSeq();
  });

  // Master volume
  document.getElementById('volSlider').addEventListener('input', function(){
    initAudio();
    const v=parseInt(this.value);
    document.getElementById('volVal').textContent=v;
    if(masterGain) masterGain.gain.setTargetAtTime(v/100, ctx.currentTime, 0.02);
  });

  // Keyboard support
  const pressedKeys = new Set();
  document.addEventListener('keydown', e => {
    if(e.repeat) return;
    const k = e.key.toLowerCase();
    if(k===' '){ e.preventDefault(); document.getElementById('seqToggle').click(); return; }
    if(keyMap[k]!==undefined && !pressedKeys.has(k)){
      pressedKeys.add(k);
      initAudio();
      if(ctx.state==='suspended') ctx.resume();
      pads[keyMap[k]].fn();
      const btn=document.querySelector('.pad[data-idx="'+keyMap[k]+'"]');
      if(btn){ btn.classList.add('hit'); setTimeout(()=>btn.classList.remove('hit'),120); }
    }
  });
  document.addEventListener('keyup', e => { pressedKeys.delete(e.key.toLowerCase()); });

  // Visualizer
  function startViz() {
    const canvas=document.getElementById('vizCanvas');
    const c=canvas.getContext('2d');
    function draw(){
      requestAnimationFrame(draw);
      canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight;
      analyser.getByteFrequencyData(vizBuf);
      c.clearRect(0,0,canvas.width,canvas.height);
      const barW=canvas.width/vizBuf.length*2.5;
      let x=0;
      for(let i=0;i<vizBuf.length;i++){
        const h=(vizBuf[i]/255)*canvas.height;
        const ratio=i/vizBuf.length;
        let r,g,b;
        if(ratio<0.33){r=201;g=168;b=76;}
        else if(ratio<0.66){r=0;g=245;b=255;}
        else{r=155;g=48;b=255;}
        const alpha=0.3+(vizBuf[i]/255)*0.7;
        c.fillStyle=`rgba(${r},${g},${b},${alpha})`;
        c.fillRect(x, canvas.height-h, barW, h);
        // reflection
        c.fillStyle=`rgba(${r},${g},${b},${alpha*0.15})`;
        c.fillRect(x, canvas.height, barW, h*0.3);
        x+=barW+1;
      }
    }
    draw();
  }

  buildSeq();
  buildPads();
})();

</script>
</body>
</html>
